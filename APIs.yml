  # * Ottiene i dati relativi alla densità dei veicoli (GET)
  # ? Tecnicamente funzionante, controllare codici HTTP
  /traffic/densities:
    get:
      summary: Retrieve individual car data
      tags:
        - Traffic
      parameters:    # ! implementare come limite basso e limite alto
        - name: timestamp
          in: query
          description: "Filter by hour (0-23)"
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 23
      responses:
        '200':
          description: A list of car observations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CarObservation'

  # * Ottiene i dati relativi alla densità dei veicoli (GET)
  # ? Tecnicamente funzionante, controllare codici HTTP
  /traffic/vehicles:
    get:
      summary: Retrieve car density statistics
      tags:
        - Traffic
      parameters:   # ! implementare come limite basso e limite alto
        - name: hour
          in: query
          description: "Filter by hour (0-23)"
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Density data for the requested period
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarDensity' 
  
# !! a che servono i link nelle apI? boh

# !! parte di components e di schemas
components:

  securitySchemes:
    
    #*-----------------------------------------------------------------
    #* Che è sta roba??
    # * Ok forse serve per i login (update di qualche ora dopo)
     XAccessTokenHeaderAuth: # arbitrary name for the security scheme
      description: >-
        The API authentication.
        The API key must be passed in the header 'x-access-token'.
        The API key must be a valid JWT token.
      type: apiKey
      in: header
      name: x-access-token
    
    TokenQueryAuth: # arbitrary name for the security scheme
      description: >-
        The API authentication.
        The API key must be passed in the query string 'token'.
        The API key must be a valid JWT token.
      type: apiKey
      in: query
      name: token

    #*-------------------------------------------------------

  schemas: 
    #*-----------------------------------------------------------------------
    #*Schemi dei database
    #* Lasciati esempi da easy lib

    User:
      type: object
      required:
        - _id
        - Attivo
        - Cognome
        - Data_Creazione
        - Email
        - Nome
        - Punti
      properties:
        _id:
          type: string
        Nome:
          type: string
          example: "Mario"
        Cognome:
          type: string
          example: "Rossi"
        Email:
          type: string
          example: "mario.rossi@example.com"
        Attivo:
          type: boolean
          description: "Whether the user account is active"
        Data_Creazione:
          type: string
          format: date-time
          description: "timestamp of account creation"
        Punti:
          type: integer
          minimum: 0
          description: "Current point balance"

    UserUpdate:
      type: object
      description: "Fields that can be modified, all of which are optional"
      properties:
        Attivo:
          type: boolean
          description: "Activate/Deactivate a user"
        Role:
          type: string
          enum: [user, admin] #!Abbiamo più tipi in realtà
          description: "Change the user's permission level"

    UserCreate: #! Da definire
    Book:
      type: object
      required:
        - title
        - author
        - ISBN
        - status
      properties:
        self:
          type: string
          description: 'Link to the book'
        title:
          type: string
          description: 'Title of the book'
        author:
          type: string
          description: 'Author of the book'
        ISBN:
          type: string
          description: 'ISBN of the book'
        status:
          type: string
          enum: [available, lended]
          description: 'Tells whether the book is currently available or not'
    
    Booklending:
      type: object
      required:
      - student
      - book
      properties:
        self:
          type: string
          description: 'Link to the booklending'
        student:
          type: string
          description: 'Link to the student'
        book:
          type: string
          description: 'Link to the book'
        start_date:
          type: string
          format: date-time
          description: 'Start date of the booklending'
          default: '${currentDate}'
        end_date:
          type: string
          format: date-time
          description: 'End date of the booklending'
        status:
          type: string
          enum: [active, expired]
          description: 'Tells whether the booklending is currently active or not'
        overdue:  
          type: boolean
          description: >-
            Tells whether the booklending is currently overdue or not.
            The booklending is overdue if the end date is in the past and the status is 'active'.
            The booklending is not overdue if the end date is in the future and the status is 'active'.
            The booklending is not overdue if the status is 'expired'.
        overdue_days:
          type: integer
          description: >-
            Number of days the booklending is overdue.
            The booklending is overdue if the end date is in the past and the status is 'active'.
            The booklending is not overdue if the end date is in the future and the status is 'active'.
            The booklending is not overdue if the status is 'expired'.
            The number of days is calculated as the difference between the current date and the end date.