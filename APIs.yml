openapi: "3.0.3"
info:
  version: "1.0"
  title: "Traffix OpenAPI"
  description: API per accedere all'ecosistema Traffix.
  license:
    name: MIT
servers:
  - url: https://api.server.test/v1
    description: Localhost
  - url: https://traffix-yjcq.onrender.com/
    description: render.com

# Sicurezza globale applicata a tutte le rotte protette dal tokenChecker
security:
  - CookieAuth: []

paths:
  /api/auth:
    post:
      summary: Autenticazione utente (Login)
      description: Consente a un utente di accedere fornendo email e password. Restituisce un token JWT sia nel corpo della risposta che all'interno di un cookie HTTP-only.
      security: [] # Questa rotta è pubblica (non richiede token)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login effettuato con successo.
          headers:
            Set-Cookie:
              schema:
                type: string
                example: token=eyJhbGciOi...; Max-Age=1800; HttpOnly
              description: Contiene il token JWT salvato in un cookie sicuro.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSuccessResponse"
        "400":
          description: Richiesta non valida. Mancano email o password.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Arguments not found"
        "401":
          description: Credenziali errate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Wrong credentials"
        "404":
          description: Utente non trovato.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "User not found"

  /api/logs:
    get:
      summary: Recupera i log di acesso
      description: Restituisce la lista di tutti i log di accesso registrati. È possibile filtrare per utente.
      parameters:
        - name: id
          in: query
          description: ID dell'utente specifico per filtrare i log.
          required: false
          schema:
            type: string
            example: "60c72b2f9b1d8a23c4d5e6f7"
      responses:
        "200":
          description: Lista dei log recuperata con successo.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Log"
        "400":
          description: Query non valida (es. ID utente malformato).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Invalid query"

  /api/users:
    get:
      summary: Recupera la lista degli utenti
      description: Restituisce tutti gli utenti registrati nel sistema. È possibile filtrare per ruolo.
      parameters:
        - name: role
          in: query
          description: ID del ruolo per filtrare gli utenti.
          required: false
          schema:
            type: string
            example: "60c72b2f9b1d8a23c4d5e6f8"
      responses:
        "200":
          description: Lista degli utenti recuperata con successo.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserResponse"
        "400":
          description: Query non valida.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Invalid query"

    post:
      summary: Crea un nuovo utente
      description: Registra un nuovo utente nel database.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreateRequest"
      responses:
        "201":
          description: Utente creato con successo.
          headers:
            Location:
              schema:
                type: string
                example: "/user/60c72b2f9b1d8a23c4d5e6f7"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Argomenti non validi o utente già esistente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingArgs:
                  summary: Argomenti mancanti
                  value:
                    success: false
                    message: "Invalid Arguments"
                alreadyPresent:
                  summary: Utente già presente
                  value:
                    success: false
                    message: "User already present"
        "500":
          description: Errore interno del server durante il salvataggio.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Internal server error"

  /api/users/me:
    get:
      summary: Ottieni informazioni sull'utente corrente
      description: Recupera il profilo e l'elenco dei moduli abilitati per l'utente loggato estratto dal token.
      responses:
        "200":
          description: Informazioni profilo dell'utente loggato.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserMeResponse"
        "400":
          description: Query non valida.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Identità utente non trovata nel token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "User identity not found in token"
        "404":
          description: Utente non trovato.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/users/{id}:
    get:
      summary: Ottieni un utente tramite ID
      description: Restituisce le informazioni di un singolo utente cercato per ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "60c72b2f9b1d8a23c4d5e6f7"
      responses:
        "200":
          description: Utente trovato.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: ID o query non validi.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Utente non trovato.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      summary: Aggiorna parzialmente un utente
      description: Consente di modificare i campi desiderati di un utente. Il corpo della richiesta deve contenere i parametri del modello utente.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "60c72b2f9b1d8a23c4d5e6f7"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
                cognome:
                  type: string
                email:
                  type: string
                attivo:
                  type: boolean
                ruolo:
                  type: string
      responses:
        "200":
          description: Utente modificato con successo.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "User updated successfully"
                  user:
                    type: object
                    description: Il record utente completo dopo l'aggiornamento.
        "400":
          description: Errore o query non valida.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Utente non trovato.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/users/{id}/password:
    patch:
      summary: Aggiorna la password di un utente
      description: Consente di aggiornare in modo sicuro la password crittografandola nel database.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "60c72b2f9b1d8a23c4d5e6f7"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
                  format: password
                  example: "NuovaPasswordSicura456!"
      responses:
        "200":
          description: Password aggiornata correttamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Password updated successfully"
        "400":
          description: Query non valida o dati errati.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Utente non trovato.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/users/{id}/moduli:
    get:
      summary: Ottieni i moduli abilitati per l'utente
      description: Recupera l'elenco dei moduli associati al ruolo dell'utente specificato.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "60c72b2f9b1d8a23c4d5e6f7"
      responses:
        "200":
          description: Elenco degli ID dei moduli abilitati.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  description: ID dell'oggetto Modulo
                example:
                  ["60c72b2f9b1d8a23c4d5e6fa", "60c72b2f9b1d8a23c4d5e6fb"]
        "400":
          description: ID o query non validi.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Utente non trovato.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/complaints:
    get:
      summary: Recupera tutte le lamentele
      description: Restituisce l'elenco completo delle segnalazioni/lamentele registrate nel sistema.
      responses:
        "200":
          description: Elenco delle lamentele recuperato con successo.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ComplaintResponse"

  /api/complaints/{id}:
    get:
      summary: Ottieni una lamentela tramite ID
      description: Recupera i dettagli di una singola segnalazione tramite il suo ID identificativo.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "60c72b2f9b1d8a23c4d5e6fc"
      responses:
        "200":
          description: Dettagli della lamentela recuperati con successo.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplaintResponse"
        "400":
          description: ID o query non validi.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Invalid query"
        "404":
          description: Lamentela non trovata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Complaint not found"

  /api/modules:
    get:
      summary: Recupera tutti i moduli
      description: Restituisce l'elenco completo dei moduli di sistema.
      responses:
        "200":
          description: Elenco dei moduli recuperato con successo.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModuleResponse"

  /api/modules/{id}:
    get:
      summary: Ottieni un modulo tramite ID
      description: Recupera le informazioni dettagliate di un singolo modulo di sistema.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "6a04dcc1dc20e82d65f6820a"
      responses:
        "200":
          description: Modulo trovato con successo.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleResponse"
        "400":
          description: ID o query non validi.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Invalid query"
        "404":
          description: Modulo non trovato.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Module not found"

    patch:
      summary: Aggiorna lo stato di attivazione di un modulo
      description: Consente di attivare o disattivare un modulo specifico tramite il flag `attivo`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "6a04dcc1dc20e82d65f6820a"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - attivo
              properties:
                attivo:
                  type: boolean
                  description: Indica se il modulo deve essere attivo o disattivato.
                  example: true
      responses:
        "200":
          description: Modulo aggiornato con successo.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Module updated successfully"
                  module:
                    $ref: "#/components/schemas/ModuleResponse"
        "400":
          description: Dati di input non validi o query fallita.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Invalid query"
        "404":
          description: Modulo non trovato.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Module not found"

  /api/roles:
    get:
      summary: Recupera tutti i ruoli
      description: Restituisce l'elenco completo di tutti i ruoli configurati nel sistema.
      responses:
        "200":
          description: Elenco dei ruoli recuperato con successo.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoleResponse"

    post:
      summary: Crea un nuovo ruolo
      description: Registra un nuovo ruolo definendo nome, descrizione e moduli associati.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nome
                - descrizione
                - moduli
              properties:
                nome:
                  type: string
                  example: "Test"
                descrizione:
                  type: string
                  example: "Ruolo di test"
                moduli:
                  type: array
                  items:
                    type: string
                  example: []
      responses:
        "201":
          description: Ruolo creato con successo.
          headers:
            Location:
              schema:
                type: string
                example: "/api/roles/6a04eb8b8338a04e2783415d"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleResponse"
        "400":
          description: Argomenti non validi o ruolo già presente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidArgs:
                  summary: Argomenti non validi
                  value:
                    success: false
                    message: "Invalid Arguments"
                alreadyPresent:
                  summary: Ruolo già esistente
                  value:
                    success: false
                    message: "Role already present"
        "500":
          description: Errore interno del server durante il salvataggio.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/roles/{id}:
    get:
      summary: Ottieni un ruolo tramite ID
      description: Recupera le informazioni di un singolo ruolo.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "6a04eb8b8338a04e2783415d"
      responses:
        "200":
          description: Dettagli del ruolo recuperati correttamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleResponse"
        "400":
          description: ID o query non validi.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Ruolo non trovato.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Role not found"

    patch:
      summary: Aggiorna parzialmente un ruolo
      description: Consente di modificare i campi come `nome`, `descrizione` o l'array dei `moduli` associati.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "6a04eb8b8338a04e2783415d"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
                  example: "TestConMappa"
                descrizione:
                  type: string
                  example: "Ruolo di test che può vedere una mappa"
                moduli:
                  type: array
                  items:
                    type: string
                  example: ["6a04dc91dc20e82d65f68209"]
      responses:
        "200":
          description: Ruolo aggiornato correttamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Role updated successfully"
                  role:
                    type: object
                    description: Record del ruolo aggiornato su DB.
        "400":
          description: Query o dati non validi.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Ruolo non trovato.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/traffic/densities:
    get:
      summary: Recupera la densità del traffico
      description: Restituisce l'elenco completo dei dati storici o attuali relativi alla densità dei flussi stradali.
      responses:
        "200":
          description: Elenco delle densità recuperato con successo.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DensityResponse"

  /api/traffic/vehicles:
    get:
      summary: Recupera il tracciamento dei veicoli
      description: Fornisce le coordinate geografiche e le marcature temporali dei singoli veicoli tracciati.
      responses:
        "200":
          description: Lista dei veicoli recuperata correttamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VehicleResponse"

  /api/prizes:
    get:
      summary: Recupera tutti i premi
      description: Restituisce l'elenco completo dei premi presenti a catalogo.
      responses:
        "200":
          description: Elenco dei premi recuperato con successo.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PrizeResponse"

    post:
      summary: Crea un nuovo premio
      description: Registra un nuovo premio nel catalogo definendo nome, descrizione, costo e data di scadenza.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - attivo
                - nome
                - descrizione
                - costo
                - termina
              properties:
                attivo:
                  type: boolean
                  example: true
                nome:
                  type: string
                  example: "Abbonamento Mensile TPL"
                descrizione:
                  type: string
                  example: "Abbonamento mensile valido su tutta la rete urbana."
                costo:
                  type: number
                  example: 250
                termina:
                  type: string
                  format: date-time
                  example: "2026-12-31T23:00:00.000Z"
      responses:
        "201":
          description: Premio creato con successo.
          headers:
            Location:
              schema:
                type: string
                example: "/prize/6a04fa08c134aaeb67d9908b"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrizeResponse"
        "400":
          description: Argomenti non validi o premio già presente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidArgs:
                  summary: Argomenti non validi
                  value:
                    success: false
                    message: "Invalid Arguments"
                alreadyPresent:
                  summary: Premio già esistente
                  value:
                    success: false
                    message: "Prize already present"
        "500":
          description: Errore interno del server durante il salvataggio.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/prizes/{id}:
    get:
      summary: Ottieni un premio tramite ID
      description: Recupera le informazioni dettagliate di un singolo premio tramite ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "6a04fa08c134aaeb67d9908b"
      responses:
        "200":
          description: Premio recuperato correttamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrizeResponse"
        "400":
          description: ID o query non validi.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Premio non trovato.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Prize not found"

    patch:
      summary: Aggiorna parzialmente un premio
      description: Consente di aggiornare singoli parametri del premio su DB (es. nome, costo, scadenza).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "6a04fa08c134aaeb67d9908b"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                attivo:
                  type: boolean
                nome:
                  type: string
                  example: "Nuovo Nome Premio"
                descrizione:
                  type: string
                costo:
                  type: number
                termina:
                  type: string
                  format: date-time
                  example: "2026-08-31T23:00:00.000Z"
      responses:
        "200":
          description: Premio modificato correttamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Prize updated successfully"
                  prize:
                    type: object
                    description: Il record del premio aggiornato.
        "400":
          description: Query o parametri non validi.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Premio non trovato.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: token
      description: Autenticazione basata su Cookie HTTP-Only contenente il token JWT.

  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: utente@esempio.it
        password:
          type: string
          format: password
          example: PasswordSicura123

    LoginSuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Enjoy your token!"
        token:
          type: string
          description: Il token JWT generato.
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        email:
          type: string
          format: email
          example: utente@esempio.it
        id:
          type: string
          example: "60c72b2f9b1d8a23c4d5e6f7"
        self:
