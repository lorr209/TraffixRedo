openapi: '3.0.3'
info:
  version: '1.0'
  title: "Traffix OpenAPI"
  description: API for accessing to the Traffix ecosystem
  license: 
    name: MIT
servers:
  - url: https://api.server.test/v1
    description: Localhost
  - url: https://traffix-yjcq.onrender.com/
    description: render.com
paths:

  # * API per l'autenticazione
  # ? Tecnicamente funzionanete, mancante gestione codici e gestione parametri non funzionanti su ?id=
  /auth:
    post:
      summary: Authenticate a user
      description: >-
        Authenticates a user and returns a JWT 'token'.
      responses:
        '200':
          description: 'Token created'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: 'True if the authentication was successful'
                  token:
                    type: string
                    description: 'JWT token'
        '401':
          description: 'Unauthorized. Invalid credentials'
      requestBody:
        description: >-
          The email and password must be passed in the body.
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  description: 'Email address of the user'
                password:
                  type: string
                  description: 'Password of the user'
            examples:
              example1:
                value:
                  email: 'mario.rossi@unitn.it'
                  password: 'password'
    
  # * API che restituisce tutti i log nel sistema 
  #TODO Aggiungere eventuali filtri ?UserID=
  # TODO: è una route protetta, indicarlo qui
  # ? Tecnicamente funzionante, aggiungere gestione codici
  /logs: 
    get:
      summary: Return the logs
      description: >-
        Shows all the logs in the system.
        Admin only.
      parameters:
        - in: query
          name: user
          schema:
            type: string
      responses:
        '200': 
          description: 'Logs list'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LogEntry' #!! CORREGGERE

  # * API per ottenere una lista degli utenti (GET) o per crearne uno nuovo (POST)
  # ? Tecnicamente funzionante, controllare codici HTTP e gestione parametri non validi su ?role=
  # ? aggiungere regex email
  /users:
    get:
      summary: returns the users
      description: >-
        Retrieve all users from the database.
      parameters:                             # * Query opzionale ?role= per filtrare
        - in: query
          name: role
          schema:
            type: string
      responses:
        "200":
          description: "Collections of users"
          content: 
            application/json:
              schema:
                type: array
                items: 
                $ref: '/component/schemas/Student' #!!!! SOSTITUIRE CON IL PATH DEL DB

    post: 
      summary: create a new user 
      description: >-
        Create a new user in the system
      requestBody:
        content:
          application/json:
            schema: 
              $ref: '/component/schemas/Student' #!!!! SOSTITUIRE CON IL PATH DEL DB
            examples:
              example1:
                value:
                  email: "mario.rossi@unitn.it" #!!!! SOSTITUIRE CON UN ESEMPIO APPROPRIATO
      responses:
        "201":
          description: "User created" #* nelle doc di open api specifica che c'è il link nel location header ????
          headers:
            "Location":
              schema:
                type: string
              description: Link to the newly created user

  # * API per ottenere i dettagli di un utente specifico (GET)
  # * o per modificarne alcuni campi (PATCH)
  # ? Tecnicamente funzionante, controllare codici HTTP e gestione parametri non validi su ?role=
  # ? aggiungere regex email
  /users/{userID}: 
    get: 
      description: >-
        retrieve the user given a certain ID
      summary: get an user
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
          description: id of the user
      responses:
        "200": 
          description: "user found"
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/user" #! il riferimento è riferito rispetto alla parte sottostante di codice
        "404":
          description: "user not found"

    patch: 
      summary: Partially update a user
      description: Update specific fields without affecting the rest of the document.
      tags:
        - Users #! Aggiungere tag
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: string
      requestBody:
        description: User fields to update
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserUpdate'
        '404':
          description: User not found

  # * API per modificare la password di un utente (PATCH) 
  # ? Tecnicamente funzionante, controllare codici HTTP
  /users/{userID}/password:
    patch: 
      description: >-
        change an user password with a provided one
      summary: change an user password
      parameters: 
        - in: path
          name: userID
          required: true
          schema:
            type: string
          description: id of the user
      requestBody:
        description: >-
          The old password, required for security purposes, and the new password must be passed in the body.
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - oldPassword
                - newPassword
              properties:
                oldPassword:
                  type: string
                  description: Old password of the user
                newPassword:
                  type: string
                  description: New password of the user
            examples:
              example1:
                value:
                  email: '1234' 
                  password: '4321'
      responses:
        '200':
          description: Password updated successfully
        '400':
          description: Invalid input or password requirements not met
        '401':
          description: Old password incorrect
        '404':
          description: User not found

  # * API per ottenere i moduli accessibili dall'utente, legati al ruolo (GET)
  # ? Tecnicamente funzionante, controllare codici HTTP
  /users/{id}/moduli:                      #? rimandiamo all'user quale moduli richiedere ma poi facciamo comunque controlli?? e come li mandiamo 
    get:
      summary: Retrieve available modules
      description: >-
        Retriveve and display to the user the available modules
      responses:
        "200":
          description: A JSON array of available modules
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string       #* IDs

  # * API per ottenere una lista delle lamentale (GET)
  # ? Tecnicamente funzionante, controllare codici HTTP
  /complaints: 
    get:
      summary: returns the complaints
      description: >-
        Retrieve all complaints from the database.
      parameters:                             # ? Query opzionale ?tipo= per filtrare
        - in: query
          name: type
          schema:
            type: string
            enum: [TPL, traffico]             # ! Vedere i tag che usiamo
      responses:
        "200":
          description: "Collections of complaints"
          content: 
            application/json:
              schema:
                type: array
                items: 
                $ref: '/component/schemas/Student' #!!!! SOSTITUIRE CON IL PATH DEL DB

  # * Cerca tutti i moduli nel sistema (GET)
  # ? Tecnicamente funzionante, controllare codici HTTP
  /modules: 
    get:
      summary: returns the modules
      description: >-
        Retrieve all modules available in the system.
      parameters:                             # * Query opzionale per filtrare i moduli attivi
        - in: query
          name: active
          schema:
            type: boolean
      responses:
        "200":
          description: "Collections of modules"
          content: 
            application/json:
              schema:
                type: array
                items: 
                $ref: '/component/schemas/Student' #!!!! SOSTITUIRE CON IL PATH DEL DB
  
  # * Attiva o disattiva un modulo (PATCH)
  # ? Tecnicamente funzionante, controllare codici HTTP
  /modules/{id}: 
    patch: 
      description: >-
        Activate/Deactivate a module
      summary: Activate/Deactivate a module
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
          description: id of the user
      responses:
        "200": 
          description: "module found"
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/module" #! il riferimento è riferito rispetto alla parte sottostante di codice
        "404":
          description: "module not found"

  # * Elenca i ruoli disponibili (GET) o ne crea uno nuovo (POST)
  # TODO: da fare documento
  # ? Tecnicamente funzionante, controllare codici HTTP
  /roles:
    get:
      summary: returns the users
      description: >-
        Retrieve all users from the database.    
      responses:
        "200":
          description: "Collections of users"
          content: 
            application/json:
              schema:
                type: array
                items: 
                $ref: '/component/schemas/Student' #!!!! SOSTITUIRE CON IL PATH DEL DB

    post: 
      summary: create a new user 
      description: >-
        Create a new user in the system
      requestBody:
        content:
          application/json:
            schema: 
              $ref: '/component/schemas/Student' #!!!! SOSTITUIRE CON IL PATH DEL DB
            examples:
              example1:
                value:
                  email: "mario.rossi@unitn.it" #!!!! SOSTITUIRE CON UN ESEMPIO APPROPRIATO
      responses:
        "201":
          description: "User created" #* nelle doc di open api specifica che c'è il link nel location header ????
          headers:
            "Location":
              schema:
                type: string
              description: Link to the newly created user
            
  # * Modifica le informazioni relative ad un ruolo (PATCH)
  # ? Tecnicamente funzionante, controllare codici HTTP
  /roles/{id}: 

    patch: 
      summary: Update a role
      description: Update specific fields without affecting the rest of the document.
      tags:
        - Role #! Aggiungere tag
      parameters:
        - name: id
          in: path
          required: true
          description: role ID
          schema:
            type: string
      requestBody:
        description: Role fields to update
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleUpdate' #! da creare
      responses:
        '200':
          description: Role updated successfully
          content:                  #? Che serva effettivamente, sia qui che altrove?
            application/json:
              schema:
                $ref: '#/components/schemas/RoleUpdate'
        '404':
          description: User not found
  
  # * Ottiene una lista dei premi (GET) o ne crea uno nuovo (POST)
  # ? Tecnicamente funzionante, controllare codici HTTP
  /prizes: 
    get:
      summary: returns the prizes
      description: >-
        Retrieve all prizes from the database.
      parameters:                             # ? Vogliamo filtrare qualcosa ?
        - in: query
          name: role
          schema:
            type: string
            enum: [user, admin]
      responses:
        "200":
          description: "Collections of prizes"
          content: 
            application/json:
              schema:
                type: array
                items: 
                $ref: '/component/schemas/Student' #!!!! SOSTITUIRE CON IL PATH DEL DB

    post: 
      summary: create a new user 
      description: >-
        Create a new user in the system
      requestBody:
        content:
          application/json:
            schema: 
              $ref: '/component/schemas/Student' #!!!! SOSTITUIRE CON IL PATH DEL DB
            examples:
              example1:
                value:
                  email: "mario.rossi@unitn.it" #!!!! SOSTITUIRE CON UN ESEMPIO APPROPRIATO
      responses:
        "201":
          description: "User created" #* nelle doc di open api specifica che c'è il link nel location header ????
          headers:
            "Location":
              schema:
                type: string
              description: Link to the newly created user

  # * Modifica informazioni relative ad un premio (PATCH)
  # ? Tecnicamente funzionante, controllare codici HTTP
  /prizes/{id}: 
    patch: 
      summary: Partially update a Prize
      description: Update specific fields without affecting the rest of the document.
      tags:
        - Prizes #! Aggiungere tag
      parameters:
        - name: id
          in: path
          required: true
