name: Node.js CI/CD

on:
  push:
    branches:
      - main      # cambia in master se il tuo branch principale si chiama master

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      SUPER_SECRET: ${{ secrets.SUPER_SECRET }}
      DB_URL: ${{ secrets.DB_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test